pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,jsonc,astro}"
      run: npx @biomejs/biome check --no-errors-on-unmatched --files-ignore-unknown=true --staged {staged_files}
      stage_fixed: true
    typecheck:
      run: npx turbo typecheck

commit-msg:
  commands:
    conventional-commits:
      run: |
        MSG=$(head -1 {1})
        if ! echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,}$"; then
          echo "Invalid commit message format."
          echo "Expected: type(scope): description"
          echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          exit 1
        fi

pre-push:
  commands:
    test:
      run: npx turbo test
    lint:
      run: npx turbo lint
