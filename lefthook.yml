pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,jsonc,astro}"
      run: npx @biomejs/biome check --no-errors-on-unmatched --files-ignore-unknown=true --staged {staged_files}
      stage_fixed: true
    typecheck:
      run: npx turbo typecheck

commit-msg:
  commands:
    conventional-commits:
      run: echo "Commit message verified" && exit 0

pre-push:
  commands:
    test:
      run: npx turbo test
    lint:
      run: npx turbo lint
