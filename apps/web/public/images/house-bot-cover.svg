    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#5b5bf7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5b5bf7" stop-opacity="0"/>
